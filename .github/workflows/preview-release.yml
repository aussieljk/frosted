name: Publish Preview Release
on: [push, pull_request]

permissions: {}

jobs:
  preview:
    name: Publish preview packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun x turbo build

      - name: Publish preview release
        run: bun x pkg-pr-new publish './packages/frosted-ui' './packages/frosted-ui-colors' './packages/frosted-ui-icons' './packages/frosted-ui-react-native'
