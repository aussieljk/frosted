# Runs on Depot managed runners (depot.dev). Requires the Depot GitHub app to be
# installed and configured for this org: https://depot.dev/docs/github-actions/quickstart
name: Publish Preview Release
on: [push, pull_request]

permissions: {}

jobs:
  preview:
    name: Publish preview packages
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build packages
        run: bun x turbo build
      - name: Publish preview release
        run: bun x pkg-pr-new publish './packages/frosted-ui' './packages/frosted-ui-colors' './packages/frosted-ui-icons' './packages/frosted-ui-react-native'
