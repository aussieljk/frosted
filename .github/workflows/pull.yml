on:
  pull_request:
    types:
      - synchronize
      - opened

name: PR

concurrency:
  group: pr-action-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install all packages
        run: bun install
      - name: Run eslint
        run: bun x eslint ./ --max-warnings 0
      - name: Run stylelint
        run: bun x turbo lint:css

  build:
    name: Build packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install all packages
        run: bun install
      - name: Build packages
        run: bun x turbo build

  test:
    name: Test repository
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install all packages
        run: bun install
      - name: Run tests
        run: bun x turbo test
