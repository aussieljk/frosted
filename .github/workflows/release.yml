# Runs on Depot managed runners (depot.dev). Requires the Depot GitHub app to be
# installed and configured for this org: https://depot.dev/docs/github-actions/quickstart
#
# Manual-only release workflow. The ONLY trigger is workflow_dispatch, so a plain
# push/merge can never version or publish anything. Two modes:
#   version — runs `changeset version` and opens a PR with the bumps
#   publish — builds @aussieljk/frosted and runs `changeset publish` (needs NPM_TOKEN secret)
name: Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'version = open a version-bump PR; publish = publish to npm'
        type: choice
        required: true
        options:
          - version
          - publish

permissions: {}

jobs:
  version:
    if: inputs.mode == 'version'
    name: Open version PR
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Apply changesets
        run: bun x changeset version
      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: version packages'
          title: 'chore: version packages'
          body: |
            Version bumps generated by `changeset version`.

            Merge this PR, then run the **Release** workflow again in `publish` mode to publish to npm.
          branch: changeset-release/main
          delete-branch: true

  publish:
    if: inputs.mode == 'publish'
    name: Publish to npm
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: write # push git tags created by `changeset publish`
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build @aussieljk/frosted
        run: bun x turbo build --filter=@aussieljk/frosted
      - name: Publish
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          bun x changeset publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
      - name: Push release tags
        run: git push --tags
